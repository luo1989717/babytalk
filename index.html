<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宝宝看图说字 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="workspace-tabs" aria-label="页面切换">
        <button class="workspace-tab is-active" type="button" data-view="practice">练习手册</button>
        <button class="workspace-tab" type="button" data-view="admin">后台管理</button>
      </nav>

      <section class="reader view-panel is-active" id="practiceView" data-view-panel="practice" aria-label="看图说字练习">
        <header class="topbar">
          <div>
            <p class="kicker">18-30个月亲子练习</p>
            <h1>宝宝看图说字</h1>
          </div>
          <div class="toolbar" aria-label="工具">
            <button class="icon-button" id="soundToggle" type="button" title="开启或关闭声音">🔊</button>
            <button class="icon-button" id="shuffleButton" type="button" title="随机排序当前词卡">🔀</button>
            <button class="icon-button" id="printButton" type="button" title="打印手册">⎙</button>
          </div>
        </header>

        <nav class="stage-tabs" aria-label="练习阶段">
          <button class="stage-tab is-active" type="button" data-stage="all">全部</button>
          <button class="stage-tab" type="button" data-stage="people">人物</button>
          <button class="stage-tab" type="button" data-stage="need">需求</button>
          <button class="stage-tab" type="button" data-stage="thing">物品</button>
          <button class="stage-tab" type="button" data-stage="animal">动物</button>
          <button class="stage-tab" type="button" data-stage="action">动作</button>
          <button class="stage-tab" type="button" data-stage="social">情绪</button>
        </nav>

        <div class="book-layout">
          <article class="word-page" aria-live="polite">
            <div class="page-meta">
              <span id="stageLabel">需求词</span>
              <span id="pageCounter">1 / 24</span>
            </div>

            <div class="picture-frame" id="pictureFrame" aria-hidden="true"></div>
            <div class="word-line">
              <span class="big-word" id="bigWord">抱</span>
              <span class="pinyin" id="pinyin">bao</span>
            </div>

            <div class="baby-actions">
              <button class="primary-action" id="speakButton" type="button">
                <span aria-hidden="true">▶</span>
                听一听
              </button>
              <button class="soft-action" id="doneButton" type="button">今天练过</button>
            </div>
          </article>

          <aside class="coach-panel" aria-label="家长引导">
            <div class="coach-section">
              <span class="section-label">家长话术</span>
              <p id="promptText">宝宝，抱抱。你想让妈妈抱吗？</p>
            </div>
            <div class="coach-section">
              <span class="section-label">互动动作</span>
              <p id="activityText">张开手臂，让宝宝模仿“要抱”的动作。</p>
            </div>
            <div class="coach-section">
              <span class="section-label">扩展说法</span>
              <div class="chips" id="chips"></div>
            </div>
            <p class="gentle-note">宝宝只要愿意看、指、笑、发出近似声音，都算一次很好的参与。</p>
          </aside>
        </div>

        <div class="pager" aria-label="翻页">
          <button class="nav-button" id="prevButton" type="button">‹ 上一页</button>
          <div class="progress-track" aria-hidden="true">
            <span id="progressBar"></span>
          </div>
          <button class="nav-button" id="nextButton" type="button">下一页 ›</button>
        </div>
      </section>

      <section class="admin-view view-panel" id="adminView" data-view-panel="admin" aria-label="后台管理" hidden>
        <header class="admin-header">
          <div>
            <p class="kicker">家长配置区</p>
            <h1>后台管理</h1>
          </div>
          <div class="bank-actions">
            <button class="small-action" id="addCardButton" type="button">新增词卡</button>
            <button class="small-action" id="resetCardsButton" type="button">恢复默认</button>
          </div>
        </header>

        <nav class="stage-tabs admin-stage-tabs" aria-label="后台分类筛选">
          <button class="stage-tab is-active" type="button" data-stage="all">全部</button>
          <button class="stage-tab" type="button" data-stage="people">人物</button>
          <button class="stage-tab" type="button" data-stage="need">需求</button>
          <button class="stage-tab" type="button" data-stage="thing">物品</button>
          <button class="stage-tab" type="button" data-stage="animal">动物</button>
          <button class="stage-tab" type="button" data-stage="action">动作</button>
          <button class="stage-tab" type="button" data-stage="social">情绪</button>
        </nav>

        <div class="admin-layout">
          <section class="word-bank" aria-label="词卡列表">
            <div class="bank-header">
              <h2>词卡</h2>
              <span id="doneCount">0个已练</span>
            </div>
            <div class="cards-grid" id="cardsGrid"></div>
          </section>

          <form class="editor-panel" id="cardEditor" aria-label="编辑词卡">
          <div class="editor-heading">
            <h2>编辑词卡</h2>
            <span id="editorHint">正在编辑当前词卡</span>
          </div>

          <div class="field-grid">
            <label>
              字
              <input id="editWord" name="word" maxlength="4" required />
            </label>
            <label>
              拼音
              <input id="editPinyin" name="pinyin" />
            </label>
            <label>
              图片
              <input id="editVisual" name="visual" maxlength="4" />
            </label>
            <label>
              图片说明
              <input id="editImageLabel" name="imageLabel" />
            </label>
          </div>

          <label>
            分类
            <select id="editStage" name="stage">
              <option value="people">人物</option>
              <option value="need">需求</option>
              <option value="thing">物品</option>
              <option value="animal">动物</option>
              <option value="action">动作</option>
              <option value="social">情绪</option>
            </select>
          </label>

          <label>
            家长话术
            <textarea id="editPrompt" name="prompt" rows="3"></textarea>
          </label>

          <label>
            互动动作
            <textarea id="editActivity" name="activity" rows="3"></textarea>
          </label>

          <label>
            扩展说法
            <input id="editChips" name="chips" placeholder="用逗号分隔，如：球球，滚球，拍球" />
          </label>

          <div class="editor-actions">
            <button class="primary-action" type="submit">保存修改</button>
            <button class="soft-action danger-action" id="deleteCardButton" type="button">删除</button>
          </div>
          </form>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
